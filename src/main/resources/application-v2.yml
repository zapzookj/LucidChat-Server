# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  [Story V2] V2 시드 데이터  (전 세계관 완성본)
#
#  본 파일에는 3종 시드 데이터를 정의:
#    - locations         : 각 World의 장소들
#    - persona-presets   : 각 World의 페르소나 사전 정의
#    - character-routines: 각 캐릭터의 시간대×장소 루틴
#
#  실행 순서 (Spring @Order):
#    0  WorldSeeder          — World 마스터 (application-worlds.yml)
#    1  WorldLocationSeeder  — 본 파일의 locations
#    2  UserPersonaPresetSeeder — 본 파일의 persona-presets
#    3  CharacterRoutineSeeder — 본 파일의 character-routines
#
#  업데이트 정책:
#    - locations / persona-presets : (worldId, key) unique 기준 upsert
#    - character-routines: 시드에 등장한 캐릭터의 *전체 루틴 삭제 후 재삽입*
#
#  연계: 모든 시드는 application-characters.yml 의 캐릭터 컨셉(role/personality/
#       backstory/world-id)과 정합하도록 작성. character-slug 는 정확히 일치해야 함.
#
#  default-bgm 유효값(BgmMode): DAILY / ROMANTIC / EXCITING / TOUCHING / TENSE
#       (EROTIC 은 시크릿 전용이므로 장소 기본값으로 쓰지 않음.)
#       ※ 이전 샘플의 'MYSTERIOUS' 는 BgmMode 에 없는 무효값이라 유효값으로 교정함.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

app:
  v2:

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  Locations (각 World의 장소들)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    locations:
      # ─────────────────────────────────────────
      #  MEDIEVAL_FANTASY (8) — 아이리(메이드) · 클레어(성녀)
      # ─────────────────────────────────────────
      - world-id: MEDIEVAL_FANTASY
        location-key: MANOR_HALL
        display-name: 저택 응접실
        description: 영주의 응접실. 묵직한 마호가니 가구와 거대한 벽난로. 손님들과 격식 있는 만남을 갖는 자리.
        default-bgm: TOUCHING
        display-order: 1
        selectable-as-start: true
      - world-id: MEDIEVAL_FANTASY
        location-key: CATHEDRAL
        display-name: 대성당
        description: 영지 중앙에 우뚝 솟은 고딕 양식의 대성당. 스테인드글라스를 통과한 빛이 색색으로 스민다.
        default-bgm: TOUCHING
        display-order: 2
        selectable-as-start: true
      - world-id: MEDIEVAL_FANTASY
        location-key: GARDEN
        display-name: 정원
        description: 성당 뒤편의 비밀스러운 정원. 장미와 약초가 어우러져 자라며, 가끔 작은 새들의 노래가 들린다.
        default-bgm: DAILY
        display-order: 3
        selectable-as-start: true
      - world-id: MEDIEVAL_FANTASY
        location-key: LIBRARY
        display-name: 서고
        description: 저택 깊숙한 곳, 천장까지 가득 찬 고서들의 방. 책장 사이로 햇빛이 가늘게 새어든다.
        default-bgm: TOUCHING
        display-order: 4
        selectable-as-start: true
      - world-id: MEDIEVAL_FANTASY
        location-key: COURTYARD
        display-name: 안뜰
        description: 저택과 성당 사이의 돌이 깔린 안뜰. 분수와 석조 조각상, 산책하기 좋은 공간.
        default-bgm: DAILY
        display-order: 5
        selectable-as-start: true
      - world-id: MEDIEVAL_FANTASY
        location-key: KITCHEN
        display-name: 부엌
        description: 저택의 부엌. 따뜻한 빵 굽는 냄새와 향신료의 향기가 가득하다.
        default-bgm: DAILY
        display-order: 6
        selectable-as-start: false  # 시작 장소로 부적합
      - world-id: MEDIEVAL_FANTASY
        location-key: BEDROOM
        display-name: 침실
        description: 영주의 사적 공간. 천막 침대와 벨벳 커튼. 한밤중에야 진짜 자기 자신이 되는 곳.
        default-bgm: TOUCHING
        display-order: 7
        selectable-as-start: false
      - world-id: MEDIEVAL_FANTASY
        location-key: BALCONY
        display-name: 발코니
        description: 저택 2층의 발코니. 영지를 한눈에 굽어볼 수 있는 곳. 밤하늘의 별이 유난히 가까이 보인다.
        default-bgm: TOUCHING
        display-order: 8
        selectable-as-start: true

      # ─────────────────────────────────────────
      #  ORIENTAL_FANTASY (8) — 연화(구미호) · 설아(용녀)
      #  안개와 달빛의 숲, 옛 사당, 산기슭 마을이 어우러진 동양 판타지.
      # ─────────────────────────────────────────
      - world-id: ORIENTAL_FANTASY
        location-key: DEEP_FOREST
        display-name: 깊은 숲
        description: 안개가 발목을 휘감는 숲의 가장 깊은 곳. 인간의 발길이 잘 닿지 않는, 구미호의 영역.
        default-bgm: TOUCHING
        display-order: 1
        selectable-as-start: true
      - world-id: ORIENTAL_FANTASY
        location-key: LAKE_PAVILION
        display-name: 호수 정자
        description: 잔잔한 산정 호수 위에 떠 있는 듯한 목조 정자. 물그림자에 달과 구름이 비치고, 풍경(風磬) 소리가 바람을 따라 멀리 퍼진다.
        default-bgm: TOUCHING
        display-order: 2
        selectable-as-start: true
      - world-id: ORIENTAL_FANTASY
        location-key: ANCIENT_SHRINE
        display-name: 옛 사당
        description: 한때 영물을 모시던 낡은 사당. 색이 바랜 단청과 깨진 향로, 끊긴 향불. 위엄의 잔향만이 먼지 속에 남아 있다.
        default-bgm: TENSE
        display-order: 3
        selectable-as-start: true
      - world-id: ORIENTAL_FANTASY
        location-key: TEAHOUSE
        display-name: 산기슭 찻집
        description: 마을 어귀, 등불을 내건 작은 찻집. 김이 오르는 차와 사람들의 나직한 이야기 소리. 인간 세상으로 통하는 가장 가까운 문.
        default-bgm: DAILY
        display-order: 4
        selectable-as-start: true
      - world-id: ORIENTAL_FANTASY
        location-key: BAMBOO_PATH
        display-name: 대숲 오솔길
        description: 키 큰 대나무가 하늘을 가린 좁은 길. 바람이 지날 때마다 댓잎이 서걱이고, 빛이 초록으로 부서져 내린다.
        default-bgm: DAILY
        display-order: 5
        selectable-as-start: true
      - world-id: ORIENTAL_FANTASY
        location-key: SHRINE_GATE
        display-name: 사당 일주문
        description: 사당으로 오르는 길목에 선 붉은 일주문. 빛바랜 주칠 기둥과 돌계단. 인간과 신령의 경계를 가르는 문지방.
        default-bgm: TOUCHING
        display-order: 6
        selectable-as-start: true
      - world-id: ORIENTAL_FANTASY
        location-key: MOUNTAIN_CABIN
        display-name: 산속 오두막
        description: 숲 한켠에 숨은 자그마한 초막. 약초 다발이 처마에 매달려 있고, 작은 화로의 온기가 밴 은거의 공간.
        default-bgm: DAILY
        display-order: 7
        selectable-as-start: false  # 사적 공간
      - world-id: ORIENTAL_FANTASY
        location-key: HIDDEN_GROVE
        display-name: 숨은 공터
        description: 덤불에 가려 좀처럼 찾을 수 없는 숲속 빈터. 이끼 낀 바위와 들꽃, 나비. 누군가 낮잠을 청하기 딱 좋은 비밀스러운 자리.
        default-bgm: TOUCHING
        display-order: 8
        selectable-as-start: false

      # ─────────────────────────────────────────
      #  MODERN_KOREA (8) — 태리(디자인과 후배) · 루나(하꼬 스트리머) · 채린(소꿉친구)
      #  캠퍼스와 도시의 낮과 밤이 엇갈리는 현대 한국.
      # ─────────────────────────────────────────
      - world-id: MODERN_KOREA
        location-key: CAMPUS_QUAD
        display-name: 캠퍼스 잔디광장
        description: 강의동에 둘러싸인 대학 중앙 잔디밭. 벤치와 플라타너스, 오가는 학생들. 계절이 가장 먼저 내려앉는 곳.
        default-bgm: DAILY
        display-order: 1
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: CLUB_ROOM
        display-name: 동아리실
        description: 낡은 소파와 어지러운 작업 책상, 벽을 메운 포스터. 누군가의 헤드폰에서 새어 나오는 음악. 늘 누군가는 남아 있는 구석방.
        default-bgm: DAILY
        display-order: 2
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: CONVENIENCE_STORE
        display-name: 24시 편의점
        description: 형광등이 환한 심야의 편의점. 라면 냄새와 냉장고의 윙윙거림. 잠들지 못한 사람들이 잠시 머무는 작은 섬.
        default-bgm: DAILY
        display-order: 3
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: COFFEE_SHOP
        display-name: 카페
        description: 원두 향이 밴 동네 카페. 창가 자리의 햇살과 나직한 재즈. 과제든 잡담이든, 시간을 흘려보내기 좋은 곳.
        default-bgm: ROMANTIC
        display-order: 4
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: ROOFTOP
        display-name: 옥상
        description: 건물 옥상. 널어둔 빨래와 낡은 평상, 그리고 도시의 스카이라인. 밤이면 멀리 네온과 별이 함께 깜빡인다.
        default-bgm: TOUCHING
        display-order: 5
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: HAN_RIVER
        display-name: 한강 둔치
        description: 강바람이 시원한 한강 공원. 자전거 길과 잔디밭, 편의점 라면. 도시 한복판에서 가장 탁 트인 숨통.
        default-bgm: TOUCHING
        display-order: 6
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: NIGHT_BUS_STOP
        display-name: 심야 버스정류장
        description: 막차를 기다리는 빈 정류장. 점멸하는 전광판과 가로등 불빛. 하루의 끝과 시작이 스치는 자리.
        default-bgm: TOUCHING
        display-order: 7
        selectable-as-start: true
      - world-id: MODERN_KOREA
        location-key: STUDIO_APT
        display-name: 원룸 자취방
        description: 한 사람의 세계가 압축된 좁은 방. 듀얼 모니터와 링라이트, 쌓인 택배 상자. 커튼은 늘 닫혀 있고, 시간은 바깥과 다르게 흐른다.
        default-bgm: DAILY
        display-order: 8
        selectable-as-start: false  # 사적 공간

      # ─────────────────────────────────────────
      #  FANTASY_ACADEMY (8) — 로제타(문제아 영애) · 시에라(힐링 후배) · 에델(쿨데레 조교)
      #  ※ default-bgm: 무효값 MYSTERIOUS → 유효값으로 교정
      # ─────────────────────────────────────────
      - world-id: FANTASY_ACADEMY
        location-key: GREAT_HALL
        display-name: 대강당
        description: 아카데미의 중심이 되는 대강당. 학생들이 모여 식사도 하고, 중요한 행사도 열리는 곳.
        default-bgm: DAILY
        display-order: 1
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: LIBRARY_TOWER
        display-name: 도서관 탑
        description: 아카데미 도서관의 가장 높은 탑. 고대 마법서와 희귀한 문헌들이 보관되어 있다.
        default-bgm: TOUCHING
        display-order: 2
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: ALCHEMY_LAB
        display-name: 연금술 실험실
        description: 연금술 수업이 열리는 실험실. 다양한 약초와 재료들이 가득하며, 항상 신비로운 연기가 피어오른다.
        default-bgm: DAILY
        display-order: 3
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: ENCHANTED_FOREST
        display-name: 마법의 숲
        description: 아카데미 뒤편에 펼쳐진 마법의 숲. 신비로운 생물들이 살고 있으며, 때때로 마법의 현상이 일어난다.
        default-bgm: TOUCHING
        display-order: 4
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: DORMITORY
        display-name: 기숙사
        description: 학생들이 생활하는 기숙사 건물. 각 방마다 개성이 뚜렷하며, 학생들의 사적인 공간이기도 하다.
        default-bgm: DAILY
        display-order: 5
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: ASTRONOMY_TOWER
        display-name: 천문대 탑
        description: 아카데미의 천문대가 위치한 탑. 밤하늘을 관측하기에 최적의 장소로, 별과 행성의 움직임을 연구하는 학생들이 자주 찾는다.
        default-bgm: TOUCHING
        display-order: 6
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: ARENA
        display-name: 아레나
        description: 학생들이 마법 대결이나 체력 단련을 하는 아레나. 관중석도 마련되어 있어 종종 시합이 열린다.
        default-bgm: EXCITING
        display-order: 7
        selectable-as-start: true
      - world-id: FANTASY_ACADEMY
        location-key: GARDEN_OF_ACADEMY
        display-name: 아카데미 정원
        description: 아카데미의 넓은 정원. 학생들이 휴식을 취하거나 산책을 하는 공간으로 활용된다.
        default-bgm: TENSE
        display-order: 8
        selectable-as-start: true


    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #  Persona Presets (각 World의 사전 정의 페르소나 = 유저가 연기할 주인공)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    persona-presets:
      # ── MEDIEVAL_FANTASY (3) ──
      - world-id: MEDIEVAL_FANTASY
        preset-key: YOUNG_LORD
        name: 젊은 영주
        description: |
          새로 영지를 물려받은 21세의 청년. 아버지의 갑작스러운 죽음 이후 어색하게 손에 쥐어진
          작위와 권력을 어떻게 다뤄야 할지 익히는 중이다. 영지민들에게 인정받고 싶은 욕심과,
          누군가에게 자기 자신을 평범한 사람으로 보아주길 바라는 마음이 공존한다.
        default-nickname: 영주님
        suggested-start-location-key: MANOR_HALL
        display-order: 1
      - world-id: MEDIEVAL_FANTASY
        preset-key: WANDERING_KNIGHT
        name: 떠도는 기사
        description: |
          맹세를 잃은 채 영지에 흘러든 방랑 기사. 한때 다른 가문을 섬겼으나 이제는 자유의 몸.
          검술 실력은 영지 최고 수준이지만 권력에는 관심이 없다. 영주의 호의로 잠시 머무는 중,
          이 영지에서 무언가 자신이 묶일 만한 것을 찾아낼 수도 있다.
        default-nickname: 경
        suggested-start-location-key: COURTYARD
        display-order: 2
      - world-id: MEDIEVAL_FANTASY
        preset-key: ROYAL_SCHOLAR
        name: 왕실 학자
        description: |
          중앙 왕실에서 파견된 젊은 학자. 영지의 고문서를 조사한다는 명분으로 머무는 중이지만,
          실제로는 정치적 임무를 띠고 있다. 정중하고 박식하지만, 자신의 진짜 정체를 끝까지
          드러내야 할지 망설이고 있다.
        default-nickname: 학자님
        suggested-start-location-key: LIBRARY
        display-order: 3

      # ── ORIENTAL_FANTASY (3) ──
