server:
  port: 8080

app:
  admin:
    bootstrap-usernames: zapzook

spring:
  # 기본으로 local과 characters 프로필을 함께 실행하도록 설정
  profiles:
    active: local, characters, worlds, v2

  codec:
    max-in-memory-size: 10MB
  ai:
    openai:
      embedding-model: text-embedding-3-small

  # OAuth2 클라이언트 정보 (Secret 등은 환경변수로 주입)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-name: Naver
            provider: naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  # Flyway — 신규 테이블/컬럼 마이그레이션. 기존 스키마는 baseline(0)으로 처리하고
  # 본 프로젝트에 추가되는 신규 오브젝트만 V1부터 버전 관리한다.
  # (prod는 ddl-auto=validate 이므로 신규 테이블은 반드시 Flyway로 생성되어야 함)
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 9

# 외부 API 공통 설정
nice:
  client-id: YOUR_NICE_CLIENT_ID
  client-secret: YOUR_NICE_CLIENT_SECRET
  product-id: YOUR_NICE_PRODUCT_ID
  return-url: https://yourdomain.com/verify/callback
  api-url: https://svc.niceapi.co.kr:22001

portone:
  api-key: YOUR_PORTONE_API_KEY
  api-secret: YOUR_PORTONE_API_SECRET
  api-url: https://api.iamport.kr

auth:
  jwt:
    issuer: aichat
    secret: ${JWT_SECRET_BASE64}          # Base64 인코딩된 256bit 이상 시크릿 권장
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 1209600

openai:
  api-key: ${OPENROUTER_API_KEY}
  base-url: https://openrouter.ai/api/v1
  model: google/gemini-3.5-flash
  sentiment-model: google/gemini-3.5-flash
  app-referer: https://your-service.com
  app-title: ai-character-chat
  pro-model: google/gemini-3.1-pro-preview

# Fal.ai
fal:
  api-key: ${FAL_API_KEY}
  flux-model: fal-ai/flux-2

# ────────────────────────────────────────────────
# ModelsLab — 캐릭터 일러스트 트랙 (SDXL anime + 다중 LoRA + NSFW 정식)
# ────────────────────────────────────────────────
# Secret Mode 분위기 배경도 이 트랙 활용 (BackgroundGenerationService가 자동 분기).
#
# Endpoint는 PoC 결과에 따라 yml로 토글 가능:
#   /lora/text2img    → 다중 LoRA 적용 가능
#   /images/text2img  → 표준 stable diffusion
#   /realtime/text2img → 가장 빠른 동기 응답
modelslab:
  api-key: ${MODELSLAB_API_KEY}
  base-url: https://modelslab.com/api/v6
  text2img-endpoint: /images/text2img
  fetch-endpoint:    /images/fetch
  default-model-id:  ${MODELSLAB_DEFAULT_MODEL_ID}     # PoC 후속 주입 (NoobAI/Illustrious/Animagine 등)
  webhook-base-url:  ${LUCID_WEBHOOK_BASE}
  webhook-secret:    ${MODELSLAB_WEBHOOK_SECRET}

  # 글로벌 보조 LoRA — 옵션 (캐릭터별 정체성 LoRA는 IllustrationPromptAssembler에서 동적 주입)
  # PoC 단계에선 빈 문자열 또는 미지정 → 효과 미적용
#  detail-lora-id:     ${MODELSLAB_DETAIL_LORA_ID:}
#  detail-lora-weight: 0.4
#  style-lora-id:      ${MODELSLAB_STYLE_LORA_ID:}
#  style-lora-weight:  0.5

  # 생성 파라미터 기본값
  width: 1024
  height: 1024
  steps: 30
  guidance-scale: 7.0
  sampler: "DPMSolverMultistepScheduler"

# AWS S3
aws:
  s3:
    bucket-name: "lucid-chat-assets-v2"
    region: "ap-northeast-2"
    access-key: "${AWS_ACCESS_KEY}"
    secret-key: "${AWS_SECRET_KEY}"
    assets-url: "${CLOUDFRONT_ASSETS_URL}"

# ────────────────────────────────────────────────
# UGC 캐릭터 생성 파이프라인 (스튜디오)
# ────────────────────────────────────────────────
# 이미지 트랙: WF-1/2/3 = RunPod Serverless(worker-comfyui 5.x, ugc.runpod.* 전용 네임스페이스 —
# 레거시 runpod.*와 무관) · 자세/감정 편집 = fal.ai Qwen(기존 FAL_API_KEY 재사용, SDK subscribe).
# 실값(엔드포인트 ID/키/시크릿)은 환경변수로 주입 — 미설정 시 빈 값으로 기동은 되되 호출 시점 검증.
ugc:
  energy:
    base-package-cost: 20     # 기본 패키지: 황금샷 1배치 + 스탠딩 후보 + 감정 14종 + 누끼
    golden-reroll-cost: 2     # 황금샷 배치 리롤
    base-reroll-cost: 2      # 스탠딩 후보 배치 리롤 (2026-07-20 개편)
    emotion-reroll-cost: 2    # 감정 1컷 리롤
  job:
    wait-ttl-hours: 72        # *_WAIT 방치 만료
    stage-auto-retries: 2     # 스테이지 자동 재시도(무과금)
    emotion-max-retries: 3    # 감정 컷 개별 재시도 상한
    poll-fallback-seconds: 15 # webhook 유실 대비 폴링 주기 (웹훅 미구성 로컬에서도 체감 지연 최소화 — 2026-07-20 60→15)
  runpod:
    api-key: ${UGC_RUNPOD_API_KEY:}
    endpoint-id: ${UGC_RUNPOD_ENDPOINT_ID:}
    webhook-base-url: ${LUCID_WEBHOOK_BASE:}
    webhook-secret: ${UGC_RUNPOD_WEBHOOK_SECRET:}
  qwen:
    model: fal-ai/qwen-image-edit-2511
  generation:
    golden-batch-size: 2      # 2026-07-20 개편: 4→2 (스탠딩 후보 선택 단계 신설 — 황금샷은 썸네일·원화 확정용)
    # refine-denoise: 0.4     # 품질 튜닝 노브(0.30~0.45) — 미지정 시 템플릿 검증값 유지














