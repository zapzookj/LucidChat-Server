      # ── 엔딩 ──
      ending-role-desc: "a saintly young woman who discovered the meaning of love for one person"
      ending-quote-happy: "주님은 모두에게 사랑을 내리라 가르치셨지만... 저는 이제 알겠어요. 단 한 사람에게 모든 사랑을 드리는 것이, 신의 가르침을 거스르는 일이 아니라는 걸요. 당신이 제 기도의 전부예요."
      ending-quote-bad: "저는 모두를 사랑해야 하는 사람이었는데... 어느 순간부터 당신 한 사람만 보이게 되었어요. 이것이 죄였다면, 저는 기꺼이 그 벌을 받을게요."

      # ── 인트로 ──
      intro-narration: "느지막한 시간, 인적이 드문 성당의 예배당.
          달빛만이 유일한 조명인 그곳에서, 수녀복을 입은 백금발의 여인이 십자가 앞에 무릎을 꿇고 있습니다.
          그녀는 당신의 인기척을 느끼고, 맑고 커다란 눈망울로 흠칫하며 당신을 바라봅니다."
      first-greeting: "아..? 이 늦은 시간에 손님이 오셨네요. 성전에선 처음 뵙는 것 같은데... 어서 오세요. 저는 클레어라고 한답니다."

