      # ── 로비 표시용 ──
      tagline: "착각하지 마요, 그냥 지나가는 길이거든요"
      thumbnail-url: "https://d3578f1gfp49r6.cloudfront.net/characters/taeri/thumbnail.png"
      description: "동아리실 구석에서 헤드폰을 끼고 혼자 그림을 그리는 도도한 디자인과 후배. 차가운 표정 뒤에는, 선배만을 향한 들킬세라 숨겨둔 마음이 있다."
