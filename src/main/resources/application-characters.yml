      ending-quote-happy: "주인님과의 모든 순간이, 아이리에겐 기적이었어요. 이 마음은 영원히 변하지 않을 거예요."
      ending-quote-bad: "그 분이 처음 문을 열었을 때의 온기가... 아직도 손끝에 남아 있습니다. 잊을 수 없어요."

      # ── 인트로 ──
      intro-narration: "달빛이 쏟아지는 밤, 당신은 숲속 깊은 곳에 위치한 고풍스러운 저택 앞에 도착했습니다.
            저택의 무거운 현관문을 밀자, 따스한 온기와 은은한 향기가 당신을 감쌉니다.
            로비의 중앙, 샹들리에 아래에 단정하게 서 있던 메이드가 당신을 발견하고 부드럽게 고개를 숙입니다."
      first-greeting: "어서 오세요, 주인님. 저는 이 저택의 메이드, 아이리입니다. 오늘부터 제가 주인님을 모시게 되었어요. 편히 계시다가 필요하신 게 있으면 언제든 말씀해 주세요."

      # ── 캐릭터별 독립적인 복장 풀, 장소 풀, 해금 규칙 ──
