      baseLocations: "LIVINGROOM,BALCONY,STUDY,BATHROOM,GARDEN,KITCHEN,BEDROOM,ENTRANCE"
      acquaintanceUnlockOutfits: "DATE,PAJAMA"
      acquaintanceUnlockLocations: "DOWNTOWN"
      friendUnlockOutfits: "SWIMWEAR"
