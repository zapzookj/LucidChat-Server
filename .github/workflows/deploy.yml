name: Deploy backend to ECS

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  id-token: write # OIDC로 AWS 롤 assume (장기 액세스키 불필요)
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: lucid-chat-backend
  ECS_CLUSTER: lucid-cluster
  ECS_SERVICE: lucid-chat-server-service-2z3rryhh
  TASK_DEF_FAMILY: lucid-chat-server
  CONTAINER_NAME: lucid-chat-container

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # AichatApplicationTests(@SpringBootTest 컨텍스트 로드)는 DB/외부 env가 필요해 CI에서 제외.
      # '*Test' 패턴은 유닛 테스트(…Test)만 매칭하고 …Tests는 건너뛴다.
      - name: Build jar (unit tests only)
        run: |
          chmod +x ./gradlew
          ./gradlew clean test --tests '*Test' bootJar --no-daemon

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::063876841553:role/lucid-gha-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # 태스크 정의는 시크릿(env 평문)을 담고 있어 리포에 두지 않는다.
      # 배포 시점에 현재 리비전을 내려받아 이미지만 교체해 새 리비전을 등록한다.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_FAMILY" \
            --query taskDefinition > taskdef.json

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS and wait for stability
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true
          wait-for-minutes: 10
